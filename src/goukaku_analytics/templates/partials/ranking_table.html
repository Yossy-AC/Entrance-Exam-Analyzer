<table class="table-base">
  <thead>
    <tr>
      <th>順位</th>
      <th>大学名</th>
      <th>分類</th>
      <th class="text-right">合格者数</th>
    </tr>
  </thead>
  <tbody>
    {% for row in ranking %}
    <tr>
      <td class="text-gray-400 text-sm">{{ loop.index }}</td>
      <td class="font-medium">{{ row.大学名 }}</td>
      <td>
        {% if row.分類 in ["国立", "公立", "大学校"] %}
          <span class="badge-kokukoku">{{ row.分類 }}</span>
        {% else %}
          <span class="badge-shiritsu">{{ row.分類 }}</span>
        {% endif %}
      </td>
      <td class="text-right font-bold text-blue-700">{{ row.合格者数 }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
