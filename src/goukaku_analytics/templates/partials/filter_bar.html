<!-- フィルタバー（各ページに include して使用） -->
<form method="get" class="mb-5 p-3 rounded-lg flex flex-wrap items-end gap-3" style="background: var(--p-surface); border: 0.5px solid var(--p-border-light);">
  <div>
    <label class="block text-xs font-medium mb-1" style="color: var(--p-text-secondary);">教室</label>
    <select name="classroom" class="text-xs rounded-md px-2 py-1.5" style="border: 1px solid var(--p-border); background: var(--p-surface); color: var(--p-text);">
      <option value="">すべて</option>
      {% for c in filter_options.classrooms %}
      <option value="{{ c }}" {% if filters.classroom == c %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-xs font-medium mb-1" style="color: var(--p-text-secondary);">学校</label>
    <select name="school" class="text-xs rounded-md px-2 py-1.5" style="border: 1px solid var(--p-border); background: var(--p-surface); color: var(--p-text);">
      <option value="">すべて</option>
      {% for s in filter_options.schools %}
      <option value="{{ s }}" {% if filters.school == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-xs font-medium mb-1" style="color: var(--p-text-secondary);">文理</label>
    <select name="bunri" class="text-xs rounded-md px-2 py-1.5" style="border: 1px solid var(--p-border); background: var(--p-surface); color: var(--p-text);">
      <option value="">すべて</option>
      {% for b in filter_options.bunri %}
      <option value="{{ b }}" {% if filters.bunri == b %}selected{% endif %}>{{ b }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-xs font-medium mb-1" style="color: var(--p-text-secondary);">国公私</label>
    <select name="kokushi" class="text-xs rounded-md px-2 py-1.5" style="border: 1px solid var(--p-border); background: var(--p-surface); color: var(--p-text);">
      <option value="">すべて</option>
      {% for k in filter_options.kokushi %}
      <option value="{{ k }}" {% if filters.kokushi == k %}selected{% endif %}>{{ k }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="flex gap-2">
    <button type="submit" class="portal-btn-primary" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">絞り込み</button>
    <a href="{{ request.url.path }}" class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors" style="color: var(--p-text-secondary); background: var(--p-bg-secondary);">リセット</a>
  </div>
</form>
